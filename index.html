<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Builder Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coc: {
                            yellow: '#FCD34D',
                            dark: '#1F2937',
                            light: '#F3F4F6'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden">

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-gray-800 text-white flex flex-col shadow-lg flex-shrink-0 absolute inset-y-0 left-0 z-50 transform -translate-x-full md:relative md:translate-x-0 transition duration-200 ease-in-out">
        <div class="p-6 bg-gray-900 flex items-center justify-between">
            <h1 class="text-xl font-bold text-yellow-400">Builder Tracker</h1>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        
        <div class="p-4 border-b border-gray-700">
             <button onclick="openModal('account-modal')" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-2 px-4 rounded transition duration-200 flex items-center justify-center gap-2">
                <span>+</span> Add Account
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto py-4" id="account-list">
            <!-- Account items will be injected here -->
        </nav>

        <div class="p-4 text-xs text-gray-500 text-center border-t border-gray-700">
            CoC Multi-Account Manager
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative w-full">
        <!-- Header -->
        <header class="bg-gray-800 shadow p-4 flex justify-between items-center z-10">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h2 class="text-xl md:text-2xl font-bold text-gray-100 truncate" id="current-account-name">Select an Account</h2>
            </div>
            <div id="account-actions" class="hidden flex-shrink-0">
                 <button onclick="deleteCurrentAccount()" class="text-red-500 hover:text-red-400 font-medium text-sm">Delete</button>
            </div>
        </header>

        <!-- Builder Grid -->
        <div class="flex-1 overflow-y-auto p-4 md:p-6">
            <div id="builder-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                <!-- Builder Cards will be injected here -->
                <div class="col-span-full text-center text-gray-500 mt-20">
                    <p class="text-xl">Select or create an account to start tracking.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Account Modal -->
    <div id="account-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg shadow-xl w-96 p-6">
            <h3 class="text-lg font-bold mb-4 text-white">Add New Account</h3>
            <input type="text" id="new-account-name" placeholder="Village Name (e.g., Main)" class="w-full border border-gray-600 bg-gray-700 text-white rounded p-2 mb-4 focus:outline-none focus:ring-2 focus:ring-yellow-500">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('account-modal')" class="text-gray-400 hover:text-gray-200 px-4 py-2">Cancel</button>
                <button onclick="addAccount()" class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold px-4 py-2 rounded">Create</button>
            </div>
        </div>
    </div>

    <!-- Start Upgrade Modal -->
    <div id="upgrade-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg shadow-xl w-96 p-6">
            <h3 class="text-lg font-bold mb-4 text-white">Start Upgrade</h3>
            <input type="hidden" id="active-builder-id">
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-300 mb-1">Building/Hero Name</label>
                <input type="text" id="upgrade-label" placeholder="e.g., Archer Queen" class="w-full border border-gray-600 bg-gray-700 text-white rounded p-2 focus:outline-none focus:ring-2 focus:ring-yellow-500">
            </div>

            <div class="grid grid-cols-3 gap-2 mb-6">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Days</label>
                    <input type="number" id="time-d" min="0" value="0" class="w-full border border-gray-600 bg-gray-700 text-white rounded p-2 text-center focus:outline-none focus:ring-2 focus:ring-yellow-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Hours</label>
                    <input type="number" id="time-h" min="0" max="23" value="0" class="w-full border border-gray-600 bg-gray-700 text-white rounded p-2 text-center focus:outline-none focus:ring-2 focus:ring-yellow-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Minutes</label>
                    <input type="number" id="time-m" min="0" max="59" value="0" class="w-full border border-gray-600 bg-gray-700 text-white rounded p-2 text-center focus:outline-none focus:ring-2 focus:ring-yellow-500">
                </div>
            </div>

            <div class="flex justify-end gap-2">
                <button onclick="closeModal('upgrade-modal')" class="text-gray-400 hover:text-gray-200 px-4 py-2">Cancel</button>
                <button onclick="startTimer()" class="bg-green-500 hover:bg-green-600 text-white font-bold px-4 py-2 rounded">Start</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
