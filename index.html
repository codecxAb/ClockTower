<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clockTower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                highlight: "#F97316", // Bright Orange
                secondary: "#EAB308", // Bright Gold
                text: "#F3F4F6",      // Off-white
                card: "#18181B",      // Zinc-900
                dark: "#09090B",      // Zinc-950
              },
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-brand-dark text-brand-text h-screen flex overflow-hidden">
    <!-- Mobile Sidebar Overlay -->
    <div
      id="sidebar-overlay"
      onclick="toggleSidebar()"
      class="fixed inset-0 bg-black bg-opacity-80 z-40 hidden md:hidden"
    ></div>

    <!-- Sidebar -->
    <aside
      id="sidebar"
      class="w-64 bg-black border-r border-brand-secondary/30 text-brand-text flex flex-col flex-shrink-0 absolute inset-y-0 left-0 z-50 transform -translate-x-full md:relative md:translate-x-0 transition duration-200 ease-in-out"
    >
      <div class="p-6 bg-black flex items-center justify-between border-b border-brand-secondary/30">
        <h1 class="text-2xl font-bold text-brand-highlight tracking-wider">clockTower</h1>
        <button
          onclick="toggleSidebar()"
          class="md:hidden text-gray-500 hover:text-brand-text"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <div class="p-4 border-b border-brand-secondary/30">
        <button
          onclick="openModal('account-modal')"
          class="w-full bg-brand-highlight hover:bg-opacity-90 text-white font-bold py-2 px-4 rounded transition duration-200 flex items-center justify-center gap-2 uppercase tracking-wide text-sm"
        >
          <span>+</span> Add Account
        </button>
      </div>

      <nav class="flex-1 overflow-y-auto py-4" id="account-list">
        <!-- Account items will be injected here -->
      </nav>

      <div
        class="p-4 text-xs text-brand-secondary/50 text-center border-t border-brand-secondary/30 uppercase tracking-widest"
      >
        clockTower MANAGER
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative w-full bg-black">
      <!-- Header -->
      <header
        class="bg-black border-b border-brand-secondary/30 p-4 flex justify-between items-center z-10"
      >
        <div class="flex items-center gap-4">
          <button
            onclick="toggleSidebar()"
            class="md:hidden text-gray-400 hover:text-brand-text"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
          <h2
            class="text-xl md:text-2xl font-bold text-brand-text truncate tracking-wide"
            id="current-account-name"
          >
            Select an Account
          </h2>
        </div>

        <div class="flex items-center gap-4">
          <div id="account-actions" class="hidden flex-shrink-0">
            <button
              onclick="deleteCurrentAccount()"
              class="text-red-600 hover:text-red-500 font-medium text-sm uppercase tracking-wide"
            >
              Delete Village
            </button>
          </div>
          <button
            onclick="openModal('sync-modal')"
            class="text-brand-secondary/70 hover:text-brand-highlight transition-colors duration-200"
            title="Cloud Sync"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- Builder Grid -->
      <div class="flex-1 overflow-y-auto p-4 md:p-6">
        <div
          id="builder-grid"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6"
        >
          <!-- Builder Cards will be injected here -->
          <div class="col-span-full text-center text-brand-secondary/40 mt-20">
            <p class="text-xl uppercase tracking-widest font-light">
              Select or create an account to start tracking.
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- Add Account Modal -->
    <div
      id="account-modal"
      class="fixed inset-0 bg-black bg-opacity-95 hidden items-center justify-center z-50 backdrop-blur-md"
    >
      <div class="bg-black border border-brand-secondary/40 rounded-xl shadow-2xl w-96 p-6">
        <h3 class="text-lg font-bold mb-4 text-brand-text tracking-wide uppercase">Add New Account</h3>
        <input
          type="text"
          id="new-account-name"
          placeholder="Village Name (e.g., Main)"
          class="w-full border border-brand-secondary/20 bg-black text-brand-text rounded p-3 mb-4 focus:outline-none focus:ring-1 focus:ring-brand-highlight placeholder-brand-secondary/30"
        />
        <div class="flex justify-end gap-2">
          <button
            onclick="closeModal('account-modal')"
            class="text-gray-500 hover:text-brand-text px-4 py-2 transition-colors"
          >
            Cancel
          </button>
          <button
            onclick="addAccount()"
            class="bg-brand-highlight hover:bg-opacity-90 text-white font-bold px-6 py-2 rounded transition-colors"
          >
            CREATE
          </button>
        </div>
      </div>
    </div>

    <!-- Start Upgrade Modal -->
    <div
      id="upgrade-modal"
      class="fixed inset-0 bg-black bg-opacity-95 hidden items-center justify-center z-50 backdrop-blur-md"
    >
      <div class="bg-black border border-brand-secondary/40 rounded-xl shadow-2xl w-96 p-6">
        <h3 class="text-lg font-bold mb-4 text-brand-text tracking-wide uppercase">Start Upgrade</h3>
        <input type="hidden" id="active-builder-id" />

        <div class="mb-4">
          <label class="block text-sm font-medium text-brand-secondary/70 mb-2 uppercase tracking-wider text-xs"
            >Building/Hero Name</label
          >
          <input
            type="text"
            id="upgrade-label"
            placeholder="e.g., Archer Queen"
            class="w-full border border-brand-secondary/20 bg-black text-brand-text rounded p-3 focus:outline-none focus:ring-1 focus:ring-brand-highlight placeholder-brand-secondary/30"
          />
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6">
          <div>
            <label class="block text-xs font-medium text-brand-secondary/40 mb-1 uppercase tracking-wider"
              >Days</label
            >
            <input
              type="number"
              id="time-d"
              min="0"
              value="0"
              class="w-full border border-brand-secondary/20 bg-black text-brand-text rounded p-3 text-center focus:outline-none focus:ring-1 focus:ring-brand-highlight"
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-brand-secondary/40 mb-1 uppercase tracking-wider"
              >Hours</label
            >
            <input
              type="number"
              id="time-h"
              min="0"
              max="23"
              value="0"
              class="w-full border border-brand-secondary/20 bg-black text-brand-text rounded p-3 text-center focus:outline-none focus:ring-1 focus:ring-brand-highlight"
            />
          </div>
          <div>
            <label class="block text-xs font-medium text-brand-secondary/40 mb-1 uppercase tracking-wider"
              >Minutes</label
            >
            <input
              type="number"
              id="time-m"
              min="0"
              max="59"
              value="0"
              class="w-full border border-brand-secondary/20 bg-black text-brand-text rounded p-3 text-center focus:outline-none focus:ring-1 focus:ring-brand-highlight"
            />
          </div>
        </div>

        <div class="flex justify-end gap-2">
          <button
            onclick="closeModal('upgrade-modal')"
            class="text-gray-500 hover:text-brand-text px-4 py-2 transition-colors"
          >
            Cancel
          </button>
          <button
            onclick="startTimer()"
            class="bg-brand-highlight hover:bg-opacity-90 text-white font-bold px-6 py-2 rounded transition-colors"
          >
            START
          </button>
        </div>
      </div>
    </div>

    <!-- Cloud Sync Modal -->
    <div
      id="sync-modal"
      class="fixed inset-0 bg-black bg-opacity-95 hidden items-center justify-center z-50 backdrop-blur-md"
    >
      <div class="bg-black border border-brand-secondary/40 rounded-xl shadow-2xl w-96 p-6">
        <h3 class="text-lg font-bold mb-2 text-brand-text tracking-wide uppercase">Cloud Sync Setup</h3>
        <p class="text-xs text-brand-secondary/60 mb-4">
          Sync data using
          <a
            href="https://jsonbin.io"
            target="_blank"
            class="text-brand-highlight hover:underline"
            >JSONBin.io</a
          >.
        </p>

        <div class="mb-4">
          <label class="block text-sm font-medium text-brand-secondary/70 mb-2 uppercase tracking-wider text-xs"
            >Bin ID (Unique ID)</label
          >
          <input
            type="text"
            id="sync-bin-id"
            placeholder="e.g., 65a4b..."
            class="w-full border border-brand-secondary/20 bg-black text-brand-text rounded p-3 focus:outline-none focus:ring-1 focus:ring-brand-highlight placeholder-brand-secondary/30"
          />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-brand-secondary/70 mb-2 uppercase tracking-wider text-xs"
            >X-Master-Key (Password)</label
          >
          <input
            type="password"
            id="sync-api-key"
            placeholder="e.g., $2a$10$..."
            class="w-full border border-brand-secondary/20 bg-black text-brand-text rounded p-3 focus:outline-none focus:ring-1 focus:ring-brand-highlight placeholder-brand-secondary/30"
          />
        </div>

        <div id="sync-status" class="text-xs text-center mb-4 hidden"></div>

        <div class="flex justify-end gap-2">
          <button
            onclick="closeModal('sync-modal')"
            class="text-gray-500 hover:text-brand-text px-4 py-2 transition-colors"
          >
            Close
          </button>
          <button
            onclick="saveSyncSettings()"
            class="bg-brand-highlight hover:bg-opacity-90 text-white font-bold px-6 py-2 rounded transition-colors"
          >
            SYNC
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
